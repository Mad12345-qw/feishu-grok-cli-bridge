services:
  - type: web
    name: feishu-gpt55-research-bridge
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SERVICE_NAME
        value: feishu-gpt55-research-bridge
      - key: MIKOTO_BASE_URL
        sync: false
      - key: MIKOTO_API_KEY
        sync: false
      - key: MIKOTO_MODEL
        value: gpt-5.5
      - key: MODEL_TIMEOUT_MS
        value: "300000"
      - key: MODEL_MAX_TOKENS
        value: "6000"
      - key: MAX_REPLY_CHARS
        value: "3500"
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: FEISHU_VERIFICATION_TOKEN
        sync: false
      - key: FEISHU_ENCRYPT_KEY
        sync: false
      - key: FEISHU_ACK_REACTION
        value: OneSecond
      - key: FEISHU_DONE_REACTION
        value: Done
      - key: FEISHU_RESEARCH_REPORT_PARENT_WIKI_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: "false"
      - key: OBSIDIAN_SYNC_ENABLED
        value: "true"
      - key: OBSIDIAN_GITHUB_TOKEN
        sync: false
      - key: OBSIDIAN_GITHUB_REPO
        value: Mad12345-qw/obsidian-knowledge-sync
      - key: OBSIDIAN_GITHUB_BRANCH
        value: main
      - key: OBSIDIAN_RESEARCH_FOLDER
        value: gpt55-research
      - key: DEBUG_TOKEN
        sync: false
